spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.fullname=${ADMIN_FULLNAME:Quản trị viên}

server.port=${PORT:8080}
bluemoon.internal.port=${INTERNAL_PORT:8081}

bluemoon.brevo.api-key=${BREVO_API_KEY}
bluemoon.mail.from=${MAIL_FROM:kiemsiwibunhucc@gmail.com}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.db.enabled=false
management.health.diskspace.enabled=false
