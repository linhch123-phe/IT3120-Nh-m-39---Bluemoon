<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Loại khoản thu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('loai-khoan-thu')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/loai-khoan-thu}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0"
                    th:text="${loaiKhoanThu.id == null} ? 'Thêm loại khoản thu' : 'Sửa loại khoản thu'">
                    Loại khoản thu
                </h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 540px;">
                <div class="card-body">
                    <form th:action="${loaiKhoanThu.id == null} ? @{/loai-khoan-thu/them} : @{/loai-khoan-thu/sua/{id}(id=${loaiKhoanThu.id})}"
                          th:object="${loaiKhoanThu}"
                          method="post"
                          novalidate>

                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="tenLoai" class="form-label">
                                Tên loại <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="tenLoai"
                                   th:field="*{tenLoai}"
                                   class="form-control"
                                   th:errorclass="is-invalid"
                                   placeholder="VD: Phí quản lý, Phí gửi xe"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('tenLoai')}"
                                 th:errors="*{tenLoai}">
                                Lỗi tên loại
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="moTa" class="form-label">Mô tả</label>
                            <textarea id="moTa"
                                      th:field="*{moTa}"
                                      class="form-control"
                                      th:errorclass="is-invalid"
                                      rows="3"
                                      placeholder="Mô tả ngắn về loại khoản thu"></textarea>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('moTa')}"
                                 th:errors="*{moTa}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="loaiApDung" class="form-label">
                                Loại áp dụng <span class="text-danger">*</span>
                            </label>
                            <select id="loaiApDung"
                                    th:field="*{loaiApDung}"
                                    class="form-select"
                                    th:errorclass="is-invalid">
                                <option value="">-- Chọn loại --</option>
                                <option th:each="lad : ${T(com.bluemoon.model.LoaiApDung).values()}"
                                        th:value="${lad}"
                                        th:text="${lad.tenHienThi}">
                                </option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('loaiApDung')}"
                                 th:errors="*{loaiApDung}">
                                Lỗi loại áp dụng
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/loai-khoan-thu}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
