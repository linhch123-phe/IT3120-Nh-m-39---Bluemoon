<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nhân khẩu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('nhan-khau')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4 class="mb-0" th:if="${hoGiaDinh == null}">Nhân khẩu</h4>
                    <h4 class="mb-0" th:unless="${hoGiaDinh == null}">
                        Nhân khẩu — Căn hộ <span th:text="${hoGiaDinh.soCanHo}"></span>
                    </h4>
                </div>
                <a th:href="@{/nhan-khau/them}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Thêm nhân khẩu
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div th:if="${emptyMsg}" class="alert alert-warning">
                <i class="bi bi-search me-1"></i><span th:text="${emptyMsg}"></span>
            </div>

            <!-- Tìm kiếm -->
            <form th:action="@{/nhan-khau}" method="get" class="mb-3 d-flex gap-2" style="max-width: 400px;">
                <input type="text" name="search" th:value="${search}" class="form-control form-control-sm"
                       placeholder="Tìm theo họ tên..."/>
                <button type="submit" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/nhan-khau}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                    <table class="table table-hover table-bordered mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Họ tên</th>
                            <th>Ngày sinh</th>
                            <th>Giới tính</th>
                            <th>CCCD</th>
                            <th>Căn hộ</th>
                            <th>Quan hệ chủ hộ</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="8" class="text-center py-5">
                                <i class="bi bi-person-x display-5 text-muted d-block mb-3" aria-hidden="true"></i>
                                <div class="fw-semibold mb-1">Chưa có nhân khẩu nào</div>
                                <div class="text-muted small mb-3">Thêm nhân khẩu mới hoặc thay đổi từ khóa tìm kiếm</div>
                                <a href="/nhan-khau/them" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-lg me-1"></i>Thêm nhân khẩu
                                </a>
                            </td>
                        </tr>
                        <tr th:each="nk, stat : ${danhSach}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${nk.hoTen}"></td>
                            <td th:text="${nk.ngaySinh != null} ? ${#temporals.format(nk.ngaySinh, 'dd/MM/yyyy')} : '--'"></td>
                            <td th:text="${nk.gioiTinh}"></td>
                            <td th:text="${nk.cccd} ?: '--'"></td>
                            <td>
                                <a th:href="@{/ho-gia-dinh/{id}(id=${nk.hoGiaDinh.id})}"
                                   th:text="${nk.hoGiaDinh.soCanHo}" class="text-decoration-none"></a>
                            </td>
                            <td th:text="${nk.quanHeChuHo}"></td>
                            <td class="text-center">
                                <a th:href="@{/nhan-khau/sua/{id}(id=${nk.id})}"
                                   class="btn btn-warning btn-sm"
                                   th:aria-label="'Sửa nhân khẩu ' + ${nk.hoTen}">
                                    <i class="bi bi-pencil" aria-hidden="true"></i>
                                </a>
                                <button type="button" class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal" data-bs-target="#confirmActionModal"
                                        th:data-confirm-url="@{/nhan-khau/xoa/{id}(id=${nk.id})}"
                                        th:data-item-name="${nk.hoTen}"
                                        data-confirm-title="Xóa nhân khẩu"
                                        data-confirm-sub="Nhân khẩu bị XÓA VĨNH VIỄN cùng toàn bộ lịch sử biến động. Không thể khôi phục."
                                        data-confirm-btn-class="btn-danger"
                                        data-confirm-btn-text="Xóa"
                                        th:aria-label="'Xóa nhân khẩu ' + ${nk.hoTen}">
                                    <i class="bi bi-trash" aria-hidden="true"></i>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    </div><!-- /table-responsive -->
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: confirmModal}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
