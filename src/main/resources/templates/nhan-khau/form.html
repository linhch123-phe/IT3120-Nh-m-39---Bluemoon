<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nhân khẩu')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('nhan-khau')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="${idHo != null} ? @{/ho-gia-dinh/{id}(id=${idHo})} : (${nhanKhau.hoGiaDinh != null} ? @{/ho-gia-dinh/{id}(id=${nhanKhau.hoGiaDinh.id})} : @{/nhan-khau})"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0" th:text="${nhanKhau.id == null} ? 'Thêm nhân khẩu' : 'Sửa nhân khẩu'"></h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 560px;">
                <div class="card-body">
                    <form th:action="${nhanKhau.id == null} ? @{/nhan-khau/them} : @{/nhan-khau/sua/{id}(id=${nhanKhau.id})}"
                          th:object="${nhanKhau}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Hộ gia đình <span class="text-danger">*</span></label>
                            <select name="hoGiaDinh.id" class="form-select"
                                    th:classappend="${#fields.hasErrors('hoGiaDinh')} ? 'is-invalid'">
                                <option value="">-- Chọn hộ gia đình --</option>
                                <option th:each="hgd : ${danhSachHo}"
                                        th:value="${hgd.id}"
                                        th:text="${hgd.soCanHo} + ' — ' + ${hgd.chuHo}"
                                        th:selected="${nhanKhau.hoGiaDinh != null and nhanKhau.hoGiaDinh.id == hgd.id}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('hoGiaDinh')}" th:errors="*{hoGiaDinh}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{hoTen}" class="form-control"
                                   th:errorclass="is-invalid" placeholder="Nhập họ và tên"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Ngày sinh</label>
                                <input type="date" th:field="*{ngaySinh}" class="form-control"/>
                            </div>
                            <div class="col">
                                <label class="form-label">Giới tính</label>
                                <select th:field="*{gioiTinh}" class="form-select">
                                    <option value="">-- Chọn --</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">CCCD</label>
                            <input type="text" th:field="*{cccd}" class="form-control"
                                   th:errorclass="is-invalid" placeholder="9 hoặc 12 chữ số"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cccd')}" th:errors="*{cccd}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" th:field="*{soDienThoai}" class="form-control"
                                   th:errorclass="is-invalid" placeholder="10 số, bắt đầu bằng 0"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('soDienThoai')}" th:errors="*{soDienThoai}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quan hệ chủ hộ</label>
                            <input type="text" th:field="*{quanHeChuHo}" class="form-control"
                                   placeholder="VD: Chủ hộ, Vợ, Con, ..."/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Tình trạng cư trú</label>
                            <select th:field="*{tinhTrang}" class="form-select">
                                <option value="">-- Chọn --</option>
                                <option th:each="tt : ${T(com.bluemoon.model.TinhTrangCuTru).values()}"
                                        th:value="${tt}" th:text="${tt.tenHienThi}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="${idHo != null} ? @{/ho-gia-dinh/{id}(id=${idHo})} : (${nhanKhau.hoGiaDinh != null} ? @{/ho-gia-dinh/{id}(id=${nhanKhau.hoGiaDinh.id})} : @{/nhan-khau})"
                               class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
