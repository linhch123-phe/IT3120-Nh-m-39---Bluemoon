<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Người dùng')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('nguoi-dung')}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0"
                    th:text="${nguoiDung.id == null} ? 'Thêm người dùng' : 'Sửa người dùng'">
                    Người dùng
                </h4>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card shadow-sm" style="max-width: 620px;">
                <div class="card-body">
                    <form th:action="${nguoiDung.id == null} ? @{/nguoi-dung/them} : @{/nguoi-dung/sua/{id}(id=${nguoiDung.id})}"
                          th:object="${nguoiDung}"
                          method="post"
                          novalidate>

                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="tenDangNhap" class="form-label">
                                Tên đăng nhập <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="tenDangNhap"
                                   th:field="*{tenDangNhap}"
                                   class="form-control"
                                   th:errorclass="is-invalid"
                                   th:readonly="${nguoiDung.id != null}"
                                   placeholder="Nhập tên đăng nhập"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('tenDangNhap')}"
                                 th:errors="*{tenDangNhap}">
                                Lỗi tên đăng nhập
                            </div>
                            <div class="form-text" th:if="${nguoiDung.id != null}">
                                Tên đăng nhập không thể thay đổi khi chỉnh sửa.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="matKhau" class="form-label">
                                <span th:text="${nguoiDung.id == null} ? 'Mật khẩu' : 'Mật khẩu mới'">
                                    Mật khẩu
                                </span>
                                <span class="text-danger" th:if="${nguoiDung.id == null}">*</span>
                            </label>

                            <input type="password"
                                   id="matKhau"
                                   name="matKhau"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('matKhau')} ? 'is-invalid'"
                                   placeholder="Nhập mật khẩu"/>

                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('matKhau')}"
                                 th:errors="*{matKhau}">
                                Lỗi mật khẩu
                            </div>

                            <div class="form-text" th:if="${nguoiDung.id != null}">
                                Bỏ trống nếu không muốn đổi mật khẩu.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="hoTen" class="form-label">
                                Họ tên <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="hoTen"
                                   th:field="*{hoTen}"
                                   class="form-control"
                                   th:errorclass="is-invalid"
                                   placeholder="Nhập họ tên"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('hoTen')}"
                                 th:errors="*{hoTen}">
                                Lỗi họ tên
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="vaiTro" class="form-label">
                                Vai trò <span class="text-danger">*</span>
                            </label>
                            <select id="vaiTro"
                                    th:field="*{vaiTro}"
                                    class="form-select"
                                    th:errorclass="is-invalid">
                                <option value="">-- Chọn vai trò --</option>
                                <option th:each="vt : ${danhSachVaiTro}"
                                        th:value="${vt}"
                                        th:text="${vt}">
                                </option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('vaiTro')}"
                                 th:errors="*{vaiTro}">
                                Lỗi vai trò
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary">
                                Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
