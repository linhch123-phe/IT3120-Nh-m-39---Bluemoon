<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hộ gia đình')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('ho-gia-dinh')}"></div>
        <main class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/ho-gia-dinh}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
                <h4 class="mb-0" th:text="${hoGiaDinh.id == null} ? 'Thêm hộ gia đình' : 'Sửa hộ gia đình'"></h4>
            </div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="card shadow-sm" style="max-width: 560px;">
                <div class="card-body">
                    <form th:action="${hoGiaDinh.id == null} ? @{/ho-gia-dinh/them} : @{/ho-gia-dinh/sua/{id}(id=${hoGiaDinh.id})}"
                          th:object="${hoGiaDinh}" method="post" novalidate class="form-submit-once">

                        <div class="mb-3">
                            <label class="form-label">Số căn hộ <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{soCanHo}" class="form-control"
                                   th:errorclass="is-invalid"
                                   th:readonly="${hoGiaDinh.id != null}"
                                   placeholder="VD: A1-101"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('soCanHo')}" th:errors="*{soCanHo}"></div>
                            <div class="form-text" th:if="${hoGiaDinh.id != null}">Số căn hộ không thể thay đổi.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tên chủ hộ <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{chuHo}" class="form-control"
                                   th:errorclass="is-invalid" placeholder="Nhập họ tên chủ hộ"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('chuHo')}" th:errors="*{chuHo}"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Diện tích (m²)</label>
                                <input type="number" th:field="*{dienTich}" class="form-control" step="0.01" min="0"/>
                            </div>
                            <div class="col">
                                <label class="form-label">Tầng / Khu vực</label>
                                <input type="text" th:field="*{tangKhuVuc}" class="form-control"
                                       th:errorclass="is-invalid"
                                       placeholder="VD: Tầng 5, Khu A"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tangKhuVuc')}" th:errors="*{tangKhuVuc}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" th:field="*{soDienThoai}" class="form-control"
                                   th:errorclass="is-invalid"
                                   placeholder="10 số, bắt đầu bằng 0"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('soDienThoai')}" th:errors="*{soDienThoai}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email chủ hộ</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   th:errorclass="is-invalid" placeholder="example@gmail.com"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                            <div class="form-text text-muted">Dùng để nhận thông báo khoản thu. Có thể để trống.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Ghi chú</label>
                            <textarea th:field="*{ghiChu}" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Lưu</button>
                            <a th:href="@{/ho-gia-dinh}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
